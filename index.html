<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Katana Zero - Perfect Iai Slasher</title>
    <style>
        :root { --bg: #0a0a0a; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: var(--bg);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            font-family: 'Courier New', monospace;
            cursor: none;
            user-select: none;
            -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        canvas {
            display: block;
            border: 2px solid #1a1a1a;
            border-radius: 4px;
            box-shadow: 0 0 60px rgba(180, 30, 30, 0.3), 0 0 120px rgba(0, 0, 0, 0.8);
        }
        #ui-overlay {
            position: fixed;
            top: 20px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 30px; align-items: center; pointer-events: none; z-index: 10;
        }
        .ui-item {
            color: #ddd; font-size: 16px; letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(255,255,255,0.5);
            background: rgba(0,0,0,0.6); padding: 8px 16px;
            border-radius: 4px; border: 1px solid rgba(255,255,255,0.15);
        }
        .ui-item.combo { color: #ff6b6b; font-weight: bold; font-size: 20px; text-shadow: 0 0 20px rgba(255,100,100,0.8); }
        .ui-item.dash { color: #6bb5ff; }
        #instructions {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            color: #666; font-size: 12px; letter-spacing: 2px; pointer-events: none;
            text-align: center; z-index: 10; background: rgba(0,0,0,0.5); padding: 10px 20px; border-radius: 20px;
        }
        #instructions span { color: #aaa; }
        #instructions .key { color: #fff; font-weight: bold; }
    </style>
</head>
<body>
    <canvas id="game"></canvas>
    <div id="ui-overlay">
        <div class="ui-item" id="score-display">SCORE: 0</div>
        <div class="ui-item combo" id="combo-display"></div>
        <div class="ui-item dash" id="dash-display">DASH: READY</div>
        <div class="ui-item" id="hp-display">HP: ❤❤❤</div>
        <div class="ui-item" id="wave-display">WAVE: 1</div>
    </div>
    <div id="instructions">
        <span class="key">WASD</span> Move &nbsp;|&nbsp;
        <span class="key">MOUSE</span> Aim &nbsp;|&nbsp;
        <span class="key">LEFT CLICK</span> Slash &nbsp;|&nbsp;
        <span class="key">RIGHT CLICK / SHIFT</span> Dash &nbsp;|&nbsp;
        <span>Chain slashes for combos!</span>
    </div>

    <script>
        (function() {
            const canvas = document.getElementById('game');
            const ctx = canvas.getContext('2d');
            const scoreDisplay = document.getElementById('score-display');
            const comboDisplay = document.getElementById('combo-display');
            const dashDisplay = document.getElementById('dash-display');
            const hpDisplay = document.getElementById('hp-display');
            const waveDisplay = document.getElementById('wave-display');

            let W, H;
            function resize() {
                const maxW = Math.min(window.innerWidth - 20, 1000);
                const maxH = Math.min(window.innerHeight - 20, 750);
                W = Math.floor(maxW); H = Math.floor(maxH);
                canvas.width = W; canvas.height = H;
            }
            resize();
            window.addEventListener('resize', resize);

            // Audio
            let audioCtx = null;
            function initAudio() {
                if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                if (audioCtx.state === 'suspended') audioCtx.resume();
            }
            function playSynth(freq, type, duration, vol = 0.08, glideTo = null) {
                if (!audioCtx) return;
                try {
                    const t = audioCtx.currentTime;
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    osc.type = type; osc.frequency.setValueAtTime(freq, t);
                    if (glideTo) osc.frequency.linearRampToValueAtTime(glideTo, t + duration);
                    gain.gain.setValueAtTime(vol, t);
                    gain.gain.exponentialRampToValueAtTime(0.0001, t + duration);
                    osc.connect(gain); gain.connect(audioCtx.destination);
                    osc.start(t); osc.stop(t + duration);
                } catch(e) {}
            }
            function sfxSlash() { playSynth(300, 'sawtooth', 0.1, 0.06, 80); playSynth(600, 'triangle', 0.08, 0.06, 200); }
            function sfxHit() { playSynth(100, 'square', 0.12, 0.08, 40); playSynth(50, 'sawtooth', 0.06, 0.06, 20); }
            function sfxKill() { playSynth(500, 'sawtooth', 0.06, 0.1, 100); playSynth(800, 'triangle', 0.07, 0.08, 300); playSynth(60, 'square', 0.05, 0.15, 25); }
            function sfxDash() { playSynth(200, 'sine', 0.15, 0.08, 600); playSynth(150, 'triangle', 0.05, 0.1, 50); }
            function sfxComboReady() { playSynth(900, 'sine', 0.06, 0.06, 1200); playSynth(1100, 'triangle', 0.04, 0.05, 1400); }

            // Input
            const keys = {};
            let mouseX = W/2, mouseY = H/2;
            let mouseDown = false, rightMouseDown = false;
            let mouseJustPressed = false, dashJustPressed = false;

            window.addEventListener('keydown', e => {
                keys[e.key.toLowerCase()] = true;
                if (e.key.toLowerCase() === 'shift') {
                    e.preventDefault();
                    if (!dashJustPressed && !keys['shift_was_down']) dashJustPressed = true;
                    keys['shift_was_down'] = true;
                }
            });
            window.addEventListener('keyup', e => { keys[e.key.toLowerCase()] = false; if (e.key.toLowerCase() === 'shift') keys['shift_was_down'] = false; });
            canvas.addEventListener('mousemove', e => {
                const rect = canvas.getBoundingClientRect();
                mouseX = (e.clientX - rect.left) * (W / rect.width);
                mouseY = (e.clientY - rect.top) * (H / rect.height);
            });
            canvas.addEventListener('mousedown', e => {
                initAudio();
                if (e.button === 0) { mouseJustPressed = true; mouseDown = true; }
                if (e.button === 2) { dashJustPressed = true; rightMouseDown = true; }
                e.preventDefault();
            });
            canvas.addEventListener('mouseup', e => { if (e.button === 0) mouseDown = false; if (e.button === 2) rightMouseDown = false; });
            canvas.addEventListener('contextmenu', e => e.preventDefault());
            canvas.addEventListener('touchstart', e => {
                initAudio(); e.preventDefault();
                const rect = canvas.getBoundingClientRect();
                mouseX = (e.touches[0].clientX - rect.left) * (W / rect.width);
                mouseY = (e.touches[0].clientY - rect.top) * (H / rect.height);
                mouseJustPressed = true; mouseDown = true;
                if (e.touches.length >= 2) dashJustPressed = true;
            });
            canvas.addEventListener('touchmove', e => {
                e.preventDefault();
                const rect = canvas.getBoundingClientRect();
                mouseX = (e.touches[0].clientX - rect.left) * (W / rect.width);
                mouseY = (e.touches[0].clientY - rect.top) * (H / rect.height);
            });
            canvas.addEventListener('touchend', e => { mouseDown = false; });

            // Particles & effects
            const particles = [];
            const trailPoints = [];
            const afterimages = [];

            function spawnParticles(x, y, count, color, speed=3, life=0.4) {
                for (let i=0;i<count;i++) {
                    const angle = Math.random()*Math.PI*2;
                    const spd = speed*(0.5+Math.random());
                    particles.push({x,y, vx:Math.cos(angle)*spd, vy:Math.sin(angle)*spd, life, maxLife:life, color, size:1.5+Math.random()*3});
                }
            }

            function spawnSlashTrail(x, y) {
                trailPoints.push({x, y, life:0.25, maxLife:0.25});
            }

            function addAfterimage(x, y, angle) {
                afterimages.push({x, y, angle, life:0.2, maxLife:0.2});
            }

            let shakeAmount=0, shakeDuration=0, shakeX=0, shakeY=0;
            function triggerShake(amount=6, duration=0.15) { shakeAmount = Math.max(shakeAmount, amount); shakeDuration = Math.max(shakeDuration, duration); }

            // Player
            const player = {
                x: W/2, y: H/2, radius: 16, speed: 220, vx:0, vy:0,
                aimAngle: 0, bodyRotation: 0,
                slashState: 'idle', slashTimer: 0, slashDuration: 0,
                comboCount: 0, comboTimer: 0, comboWindow: 0.55,
                slashHitEnemies: new Set(),
                dashActive: false, dashTimer: 0, dashDuration: 0.13, dashSpeed: 900,
                dashDirX:0, dashDirY:0, dashCooldown:0, dashCooldownMax:1.1,
                hp: 3, maxHp: 3, invulnTimer: 0, invulnDuration: 1.2,
                bladeGlow: 0,
                rightHandDist: 18,
                sheathLeftDist: 14,
                sheathBackDist: 6,
                readyAngleOffset: 2.4,   // behind right shoulder
                endAngleOffset: -1.2,    // across front
            };

            function resetPlayer() {
                player.x = W/2; player.y = H/2;
                player.hp = player.maxHp;
                player.slashState = 'idle';
                player.dashActive = false; player.dashCooldown = 0;
                player.comboCount = 0; player.comboTimer = 0;
                player.invulnTimer = 1.5; player.bladeGlow = 0;
                player.slashHitEnemies.clear();
                player.vx=0; player.vy=0; player.bodyRotation=0;
            }

            // Enemies
            const enemies = [];
            const enemyTypes = [
                { name:'grunt', radius:13, speed:90, hp:1, color:'#c0392b', score:100 },
                { name:'runner', radius:11, speed:170, hp:1, color:'#e74c3c', score:150 },
                { name:'brute', radius:20, speed:55, hp:3, color:'#8b0000', score:400 }
            ];

            function spawnEnemy(typeIndex=null) {
                if (typeIndex===null) {
                    const roll = Math.random();
                    typeIndex = roll<0.6?0:(roll<0.9?1:2);
                }
                const type = enemyTypes[Math.min(typeIndex,2)];
                let sx, sy;
                const margin=40;
                switch(Math.floor(Math.random()*4)) {
                    case 0: sx=-margin; sy=Math.random()*H; break;
                    case 1: sx=W+margin; sy=Math.random()*H; break;
                    case 2: sx=Math.random()*W; sy=-margin; break;
                    case 3: sx=Math.random()*W; sy=H+margin; break;
                }
                enemies.push({
                    x:sx, y:sy, radius:type.radius, speed:type.speed*(0.85+Math.random()*0.3),
                    hp:type.hp, maxHp:type.hp, color:type.color, score:type.score,
                    name:type.name, hitFlash:0, stunTimer:0, knockbackVx:0, knockbackVy:0
                });
            }

            let waveNumber=1, waveActive=false, waveSpawnTimer=0, waveSpawnInterval=0.8, waveEnemiesToSpawn=0, waveSpawnedCount=0;
            let gameScore=0, gameOver=false, gameOverTimer=0;

            function startWave(num) {
                waveNumber=num; waveEnemiesToSpawn=5+num*3; waveSpawnedCount=0;
                waveActive=true; waveSpawnTimer=0; waveSpawnInterval=Math.max(0.25,0.8-num*0.05);
                if(num>2){ for(let i=0;i<Math.floor(num/2);i++) spawnEnemy(num>5?Math.floor(Math.random()*3):Math.floor(Math.random()*2)); waveSpawnedCount=Math.floor(num/2); }
                updateUI();
            }

            function updateUI() {
                scoreDisplay.textContent = `SCORE: ${gameScore}`;
                waveDisplay.textContent = `WAVE: ${waveNumber}`;
                hpDisplay.textContent = `HP: ${'❤'.repeat(Math.max(0,player.hp))}${'🖤'.repeat(Math.max(0,player.maxHp-player.hp))}`;
                if(player.comboCount>=3) comboDisplay.textContent=`COMBO x${player.comboCount}`;
                else if(player.comboCount>0) comboDisplay.textContent=`COMBO x${player.comboCount}`;
                else comboDisplay.textContent='';
                const dashReady = player.dashCooldown<=0 && !player.dashActive;
                dashDisplay.textContent = dashReady?'DASH: READY':'DASH: CD';
                dashDisplay.style.color = dashReady?'#6bb5ff':'#ff6b6b';
            }

            function triggerGameOver() {
                gameOver=true; gameOverTimer=0;
                player.slashState='idle'; player.dashActive=false; player.vx=0; player.vy=0;
                spawnParticles(player.x,player.y,60,'#ff0000',8,0.8);
                triggerShake(16,0.5); playSynth(40,'sawtooth',0.5,0.1,20);
            }

            function restartGame() {
                gameScore=0; gameOver=false; waveNumber=1;
                enemies.length=0; particles.length=0; trailPoints.length=0; afterimages.length=0;
                shakeAmount=0; shakeDuration=0; player.slashHitEnemies.clear();
                resetPlayer(); startWave(1); updateUI();
            }

            // Helper positions
            function getRightHandPos() {
                const cos = Math.cos(player.aimAngle), sin = Math.sin(player.aimAngle);
                return {
                    x: player.x + sin * player.rightHandDist,
                    y: player.y - cos * player.rightHandDist
                };
            }

            function getSheathPos() {
                const cos = Math.cos(player.aimAngle), sin = Math.sin(player.aimAngle);
                return {
                    x: player.x - sin * player.sheathLeftDist - cos * player.sheathBackDist,
                    y: player.y + cos * player.sheathLeftDist - sin * player.sheathBackDist
                };
            }

            function getSheathEndPos() {
                const sheathPos = getSheathPos();
                const angle = player.aimAngle + Math.PI + 0.25; // sheath orientation
                const len = 32;
                return {
                    x: sheathPos.x + Math.cos(angle) * len * 0.6,
                    y: sheathPos.y + Math.sin(angle) * len * 0.6
                };
            }

            // Get sword transform with corrected draw direction (forward)
            function getSwordTransform() {
                const sheathPos = getSheathPos();
                const sheathEndPos = getSheathEndPos();
                const rightHand = getRightHandPos();
                const sheathAngle = player.aimAngle + Math.PI + 0.25; // blade direction when sheathed (pointing back-left)
                const drawDirectionAngle = player.aimAngle + 0.3; // forward direction (slightly right of aim)
                const readyAngle = player.aimAngle + player.readyAngleOffset;
                const endAngle = player.aimAngle + player.endAngleOffset;
                const drawOutDistance = 44; // how far the blade/handle pulls out

                if (player.slashState === 'idle') {
                    // Sheathed: handle protrudes from sheath end
                    return { x: sheathEndPos.x, y: sheathEndPos.y, angle: sheathAngle, sheathed: true };
                }

                const progress = 1 - (player.slashTimer / player.slashDuration);
                const t = progress;

                if (player.slashState === 'windup') {
                    const pullOutPhase = 0.35;
                    if (t <= pullOutPhase) {
                        const localT = t / pullOutPhase;
                        const eased = easeOutQuad(localT);
                        // Draw forward along drawDirectionAngle
                        const drawX = sheathEndPos.x + Math.cos(drawDirectionAngle) * drawOutDistance * eased;
                        const drawY = sheathEndPos.y + Math.sin(drawDirectionAngle) * drawOutDistance * eased;
                        const angle = drawDirectionAngle; // point forward
                        return { x: drawX, y: drawY, angle: angle, sheathed: false };
                    } else {
                        const localT = (t - pullOutPhase) / (1 - pullOutPhase);
                        const eased = easeInQuad(localT);
                        // Move from forward drawn position to right hand ready position
                        const startX = sheathEndPos.x + Math.cos(drawDirectionAngle) * drawOutDistance;
                        const startY = sheathEndPos.y + Math.sin(drawDirectionAngle) * drawOutDistance;
                        const interpX = startX + (rightHand.x - startX) * eased;
                        const interpY = startY + (rightHand.y - startY) * eased;
                        const interpAngle = drawDirectionAngle + (readyAngle - drawDirectionAngle) * eased;
                        return { x: interpX, y: interpY, angle: interpAngle, sheathed: false };
                    }
                } else if (player.slashState === 'active') {
                    return {
                        x: rightHand.x, y: rightHand.y,
                        angle: readyAngle + (endAngle - readyAngle) * easeOutQuad(t),
                        sheathed: false
                    };
                } else if (player.slashState === 'recovery') {
                    return {
                        x: rightHand.x + (sheathEndPos.x - rightHand.x) * easeOutCubic(t),
                        y: rightHand.y + (sheathEndPos.y - rightHand.y) * easeOutCubic(t),
                        angle: endAngle + (sheathAngle - endAngle) * easeOutCubic(t),
                        sheathed: false
                    };
                }
                return { x: sheathEndPos.x, y: sheathEndPos.y, angle: sheathAngle, sheathed: true };
            }

            // Thick hitbox for slash (line with larger radius)
            function checkSwordHitEnemy(enemy, swordBase, swordTip) {
                const ex = enemy.x, ey = enemy.y;
                const hitboxThickness = 14; // thicker slash effect
                const r = enemy.radius + hitboxThickness;
                const dx = swordTip.x - swordBase.x, dy = swordTip.y - swordBase.y;
                const lenSq = dx*dx+dy*dy;
                if (lenSq < 0.001) return Math.hypot(ex - swordBase.x, ey - swordBase.y) <= r;
                let t = ((ex - swordBase.x)*dx + (ey - swordBase.y)*dy) / lenSq;
                t = Math.max(0, Math.min(1, t));
                const projX = swordBase.x + t*dx, projY = swordBase.y + t*dy;
                return Math.hypot(ex - projX, ey - projY) <= r;
            }

            function initiateSlash() {
                player.slashState = 'windup';
                player.slashDuration = 0.22;
                player.slashTimer = player.slashDuration;
                player.slashHitEnemies.clear();
                player.bladeGlow = 0.6;
                player.comboCount = Math.min(5, player.comboCount + 1);
                player.comboTimer = player.comboWindow;
                if (player.comboCount >= 3) sfxComboReady();
                sfxSlash();
            }

            // Update loop
            let lastTime = performance.now();
            function update(dt) {
                const clampedDt = Math.min(dt, 0.1);
                if (gameOver) {
                    gameOverTimer += clampedDt;
                    updateParticles(clampedDt); updateTrails(clampedDt); updateAfterimages(clampedDt); updateShake(clampedDt);
                    for (const enemy of enemies) { if(enemy.stunTimer>0) enemy.stunTimer-=clampedDt; if(enemy.hitFlash>0) enemy.hitFlash-=clampedDt; }
                    if (gameOverTimer > 2.5 && (keys['r'] || mouseJustPressed)) { restartGame(); mouseJustPressed = false; }
                    return;
                }

                if (player.comboTimer > 0) { player.comboTimer -= clampedDt; if (player.comboTimer <= 0) player.comboCount = 0; }
                if (player.invulnTimer > 0) player.invulnTimer -= clampedDt;
                if (player.dashCooldown > 0) player.dashCooldown -= clampedDt;
                if (player.bladeGlow > 0) player.bladeGlow -= clampedDt * 3;

                let moveX=0, moveY=0;
                if (keys['w']||keys['arrowup']) moveY=-1;
                if (keys['s']||keys['arrowdown']) moveY=1;
                if (keys['a']||keys['arrowleft']) moveX=-1;
                if (keys['d']||keys['arrowright']) moveX=1;
                const moveLen = Math.sqrt(moveX*moveX+moveY*moveY);
                if (moveLen>1) { moveX/=moveLen; moveY/=moveLen; }

                player.aimAngle = Math.atan2(mouseY - player.y, mouseX - player.x);

                // Dash
                if (dashJustPressed && player.dashCooldown<=0 && !player.dashActive && player.slashState==='idle') {
                    player.dashActive=true; player.dashTimer=player.dashDuration; player.dashCooldown=player.dashCooldownMax;
                    player.invulnTimer=Math.max(player.invulnTimer, player.dashDuration+0.05);
                    if(moveLen>0.1){ player.dashDirX=moveX; player.dashDirY=moveY; }
                    else { player.dashDirX=Math.cos(player.aimAngle); player.dashDirY=Math.sin(player.aimAngle); }
                    sfxDash(); spawnParticles(player.x,player.y,12,'#88ccff',4,0.3);
                    player.slashState='idle'; player.slashHitEnemies.clear();
                }
                dashJustPressed = false;

                if (player.dashActive) {
                    player.dashTimer -= clampedDt;
                    player.x += player.dashDirX * player.dashSpeed * clampedDt;
                    player.y += player.dashDirY * player.dashSpeed * clampedDt;
                    if (player.dashAfterimageTimer <= 0) { player.dashAfterimageTimer = 0.025; addAfterimage(player.x, player.y, player.aimAngle); }
                    player.dashAfterimageTimer -= clampedDt;
                    for (const enemy of enemies) {
                        if (Math.hypot(enemy.x-player.x, enemy.y-player.y) < player.radius+enemy.radius+10) { killEnemy(enemy); triggerShake(3,0.08); }
                    }
                    if (player.dashTimer <= 0) { player.dashActive=false; player.vx=player.dashDirX*60; player.vy=player.dashDirY*60; }
                } else {
                    player.vx = moveX * player.speed; player.vy = moveY * player.speed;
                    player.x += player.vx * clampedDt; player.y += player.vy * clampedDt;
                }
                player.x = Math.max(player.radius, Math.min(W-player.radius, player.x));
                player.y = Math.max(player.radius, Math.min(H-player.radius, player.y));

                let rotDiff = player.aimAngle - player.bodyRotation;
                while(rotDiff>Math.PI) rotDiff-=Math.PI*2; while(rotDiff<-Math.PI) rotDiff+=Math.PI*2;
                player.bodyRotation += rotDiff * Math.min(1, clampedDt*14);

                // Slash state machine
                if (mouseJustPressed && player.slashState==='idle' && !player.dashActive) initiateSlash();
                mouseJustPressed = false;

                if (player.slashState !== 'idle') {
                    player.slashTimer -= clampedDt;
                    if (player.slashState === 'windup' && player.slashTimer <= 0) {
                        player.slashState = 'active'; player.slashDuration = 0.1; player.slashTimer = player.slashDuration;
                        player.slashHitEnemies.clear(); player.bladeGlow = 1;
                    } else if (player.slashState === 'active') {
                        const sword = getSwordTransform();
                        const tipX = sword.x + Math.cos(sword.angle) * 48;
                        const tipY = sword.y + Math.sin(sword.angle) * 48;
                        spawnSlashTrail(tipX, tipY);
                        for (const enemy of enemies) {
                            if (!player.slashHitEnemies.has(enemy) && enemy.hp>0 && checkSwordHitEnemy(enemy, sword, {x:tipX, y:tipY})) {
                                player.slashHitEnemies.add(enemy);
                                enemy.hp--; enemy.hitFlash=0.1; enemy.stunTimer=0.2;
                                const angleToEnemy = Math.atan2(enemy.y-sword.y, enemy.x-sword.x);
                                enemy.knockbackVx = Math.cos(angleToEnemy)*200;
                                enemy.knockbackVy = Math.sin(angleToEnemy)*200;
                                spawnParticles(enemy.x,enemy.y,8,'#ffaa00',4,0.3);
                                triggerShake(2+player.comboCount,0.06);
                                if (enemy.hp<=0) killEnemy(enemy); else sfxHit();
                            }
                        }
                        if (player.slashTimer <= 0) {
                            player.slashState='recovery'; player.slashDuration=0.25; player.slashTimer=player.slashDuration;
                        }
                    } else if (player.slashState === 'recovery' && player.slashTimer <= 0) {
                        player.slashState='idle'; player.slashHitEnemies.clear();
                    }
                }

                // Enemy AI
                for (const enemy of enemies) {
                    if (enemy.stunTimer>0) { enemy.stunTimer-=clampedDt; enemy.x+=enemy.knockbackVx*clampedDt*3; enemy.y+=enemy.knockbackVy*clampedDt*3; enemy.knockbackVx*=0.9; enemy.knockbackVy*=0.9; continue; }
                    const edx=player.x-enemy.x, edy=player.y-enemy.y, dist=Math.sqrt(edx*edx+edy*edy);
                    if(dist>0){ enemy.x+= (edx/dist)*enemy.speed*clampedDt; enemy.y+= (edy/dist)*enemy.speed*clampedDt; }
                    enemy.x=Math.max(-30,Math.min(W+30,enemy.x)); enemy.y=Math.max(-30,Math.min(H+30,enemy.y));
                    if(enemy.hitFlash>0) enemy.hitFlash-=clampedDt;
                }

                // Player damage
                if(player.invulnTimer<=0 && !player.dashActive && !gameOver){
                    for(const enemy of enemies){
                        if(Math.hypot(player.x-enemy.x, player.y-enemy.y) < player.radius+enemy.radius){
                            player.hp--; player.invulnTimer=player.invulnDuration;
                            triggerShake(8,0.2); spawnParticles(player.x,player.y,20,'#ff4444',5,0.5); sfxHit();
                            if(player.hp<=0) triggerGameOver();
                            break;
                        }
                    }
                }

                // Wave
                if(waveActive){
                    waveSpawnTimer-=clampedDt;
                    if(waveSpawnTimer<=0 && waveSpawnedCount<waveEnemiesToSpawn){
                        spawnEnemy(); waveSpawnedCount++; waveSpawnTimer=waveSpawnInterval*(0.7+Math.random()*0.6);
                    }
                    if(waveSpawnedCount>=waveEnemiesToSpawn && enemies.filter(e=>e.hp>0).length===0){
                        waveActive=false; player.invulnTimer=Math.max(player.invulnTimer,1.5);
                        spawnParticles(player.x,player.y,30,'#ffd700',3,0.6); sfxComboReady();
                        setTimeout(()=>{ if(!gameOver) startWave(waveNumber+1); }, 2000);
                    }
                }

                updateParticles(clampedDt); updateTrails(clampedDt); updateAfterimages(clampedDt); updateShake(clampedDt);
                updateUI();
            }

            function killEnemy(enemy) {
                enemy.hp=0; gameScore+=player.comboCount*enemy.score;
                spawnParticles(enemy.x,enemy.y,18+player.comboCount*4,enemy.color,6,0.5);
                spawnParticles(enemy.x,enemy.y,10,'#ffffff',3,0.25);
                triggerShake(4+player.comboCount,0.12); sfxKill();
                particles.push({x:enemy.x,y:enemy.y, vx:(Math.random()-0.5)*20, vy:-40-Math.random()*30, life:0.8, maxLife:0.8, color:'#ffd700', size:0, text:`+${player.comboCount*enemy.score}`, isText:true});
            }

            function updateParticles(dt){ for(let i=particles.length-1;i>=0;i--){ let p=particles[i]; p.life-=dt; if(p.life<=0) particles.splice(i,1); else{ p.x+=p.vx*dt; p.y+=p.vy*dt; if(!p.isText) p.size*=0.98; } } }
            function updateTrails(dt){ for(let i=trailPoints.length-1;i>=0;i--){ trailPoints[i].life-=dt; if(trailPoints[i].life<=0) trailPoints.splice(i,1); } }
            function updateAfterimages(dt){ for(let i=afterimages.length-1;i>=0;i--){ afterimages[i].life-=dt; if(afterimages[i].life<=0) afterimages.splice(i,1); } }
            function updateShake(dt){ if(shakeDuration>0){ shakeDuration-=dt; let intensity=shakeAmount*(shakeDuration/0.15); shakeX=(Math.random()-0.5)*intensity*2; shakeY=(Math.random()-0.5)*intensity*2; if(shakeDuration<=0){ shakeX=0;shakeY=0;shakeAmount=0; } } }

            function easeInQuad(t){ return t*t; }
            function easeOutQuad(t){ return t*(2-t); }
            function easeOutCubic(t){ return 1-Math.pow(1-t,3); }

            // ---------- RENDERING ----------
            function drawFloor(){
                ctx.fillStyle='#1a1a1a'; ctx.fillRect(0,0,W,H);
                ctx.strokeStyle='rgba(255,255,255,0.03)'; ctx.lineWidth=1;
                for(let x=50;x<W;x+=50){ ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,H); ctx.stroke(); }
                for(let y=50;y<H;y+=50){ ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke(); }
            }

            function drawSheath(px, py){
                const sheathPos = getSheathPos();
                const angle = player.aimAngle + Math.PI + 0.25;
                const len = 32, width = 6;
                const cos = Math.cos(angle), sin = Math.sin(angle);
                const startX = sheathPos.x - cos*len*0.4, startY = sheathPos.y - sin*len*0.4;
                const endX = sheathPos.x + cos*len*0.6, endY = sheathPos.y + sin*len*0.6;
                ctx.save();
                ctx.strokeStyle = '#3a2a1a'; ctx.lineWidth = width+2; ctx.lineCap = 'round';
                ctx.beginPath(); ctx.moveTo(startX, startY); ctx.lineTo(endX, endY); ctx.stroke();
                ctx.strokeStyle = '#5a4a3a'; ctx.lineWidth = width;
                ctx.beginPath(); ctx.moveTo(startX, startY); ctx.lineTo(endX, endY); ctx.stroke();
                ctx.fillStyle = '#1a0a00';
                ctx.beginPath(); ctx.arc(endX, endY, width/1.5, 0, Math.PI*2); ctx.fill();
                ctx.restore();
            }

            function drawPlayer(){
                ctx.save();
                const px = player.x + shakeX, py = player.y + shakeY;
                if(player.invulnTimer>0 && Math.floor(player.invulnTimer*20)%2===0 && !player.dashActive) ctx.globalAlpha=0.4;

                ctx.fillStyle='rgba(0,0,0,0.5)'; ctx.beginPath(); ctx.arc(px+2,py+2,player.radius,0,Math.PI*2); ctx.fill();
                const bodyGrad = ctx.createRadialGradient(px-3,py-3,player.radius*0.2,px,py,player.radius);
                bodyGrad.addColorStop(0,'#e8e8e8'); bodyGrad.addColorStop(0.7,'#b0b0b0'); bodyGrad.addColorStop(1,'#606060');
                ctx.fillStyle=bodyGrad; ctx.beginPath(); ctx.arc(px,py,player.radius,0,Math.PI*2); ctx.fill();
                ctx.strokeStyle='rgba(255,255,255,0.3)'; ctx.lineWidth=1.5; ctx.stroke();
                ctx.fillStyle='rgba(255,255,255,0.5)';
                ctx.beginPath(); ctx.arc(px+Math.cos(player.bodyRotation)*player.radius*0.5, py+Math.sin(player.bodyRotation)*player.radius*0.5, player.radius*0.35,0,Math.PI*2); ctx.fill();

                drawSheath(px, py);
                ctx.restore();
            }

            function drawSword(){
                const sword = getSwordTransform();
                const {x, y, angle, sheathed} = sword;
                const bladeLen = 48, handleLen = 16;
                const tipX = x + Math.cos(angle)*bladeLen, tipY = y + Math.sin(angle)*bladeLen;

                ctx.save();
                if (sheathed) {
                    const sheathEnd = getSheathEndPos();
                    const handleStartX = sheathEnd.x;
                    const handleStartY = sheathEnd.y;
                    const handleEndX = sheathEnd.x + Math.cos(angle) * handleLen;
                    const handleEndY = sheathEnd.y + Math.sin(angle) * handleLen;
                    ctx.strokeStyle = '#2a1a0a'; ctx.lineWidth = 5; ctx.lineCap = 'round';
                    ctx.beginPath(); ctx.moveTo(handleStartX, handleStartY); ctx.lineTo(handleEndX, handleEndY); ctx.stroke();
                    ctx.fillStyle = '#1a1a1a';
                    ctx.beginPath(); ctx.arc(handleStartX, handleStartY, 3.5, 0, Math.PI*2); ctx.fill();
                } else {
                    const perpAngle = angle + Math.PI/2;
                    const baseWidth = 2.8, tipWidth = 0.7;
                    const edgeBaseX = x + Math.cos(perpAngle)*baseWidth, edgeBaseY = y + Math.sin(perpAngle)*baseWidth;
                    const edgeTipX = tipX + Math.cos(perpAngle)*tipWidth, edgeTipY = tipY + Math.sin(perpAngle)*tipWidth;
                    const spineBaseX = x - Math.cos(perpAngle)*baseWidth, spineBaseY = y - Math.sin(perpAngle)*baseWidth;
                    const spineTipX = tipX - Math.cos(perpAngle)*tipWidth, spineTipY = tipY - Math.sin(perpAngle)*tipWidth;
                    const curveOffset = 7;
                    const spineMidX = (spineBaseX + spineTipX)/2 - Math.cos(angle)*curveOffset;
                    const spineMidY = (spineBaseY + spineTipY)/2 - Math.sin(angle)*curveOffset;

                    const bladeGrad = ctx.createLinearGradient(
                        x - Math.cos(perpAngle)*4, y - Math.sin(perpAngle)*4,
                        x + Math.cos(perpAngle)*4, y + Math.sin(perpAngle)*4
                    );
                    bladeGrad.addColorStop(0,'#d0d0d0');
                    bladeGrad.addColorStop(0.3,'#f5f5f5');
                    bladeGrad.addColorStop(0.5,'#ffffff');
                    bladeGrad.addColorStop(0.7,'#e0e0e0');
                    bladeGrad.addColorStop(1,'#a0a0a0');

                    ctx.fillStyle = bladeGrad;
                    ctx.strokeStyle = 'rgba(255,255,255,0.6)';
                    ctx.lineWidth = 0.8;
                    ctx.beginPath();
                    ctx.moveTo(edgeBaseX, edgeBaseY);
                    ctx.lineTo(edgeTipX, edgeTipY);
                    ctx.quadraticCurveTo(spineMidX, spineMidY, spineBaseX, spineBaseY);
                    ctx.closePath();
                    ctx.fill();
                    ctx.stroke();

                    // Hamon
                    ctx.strokeStyle = 'rgba(255,255,255,0.4)';
                    ctx.lineWidth = 0.5;
                    ctx.beginPath();
                    const hamonStartX = x + Math.cos(perpAngle)*1.2, hamonStartY = y + Math.sin(perpAngle)*1.2;
                    const hamonEndX = tipX + Math.cos(perpAngle)*0.2, hamonEndY = tipY + Math.sin(perpAngle)*0.2;
                    ctx.moveTo(hamonStartX, hamonStartY);
                    ctx.lineTo(hamonEndX, hamonEndY);
                    ctx.stroke();

                    // Handle
                    ctx.strokeStyle = '#2a1a0a'; ctx.lineWidth = 4.5;
                    ctx.beginPath(); ctx.moveTo(x, y); ctx.lineTo(x - Math.cos(angle)*handleLen, y - Math.sin(angle)*handleLen); ctx.stroke();
                    ctx.fillStyle = '#1a1a1a'; ctx.beginPath(); ctx.arc(x, y, 3.5, 0, Math.PI*2); ctx.fill();
                }
                ctx.restore();
            }

            function drawEnemies(){
                for(const enemy of enemies){
                    if(enemy.hp<=0) continue;
                    ctx.save();
                    const ex = enemy.x+shakeX, ey = enemy.y+shakeY;
                    let color = enemy.color;
                    if(enemy.hitFlash>0) color='#ffffff';
                    ctx.fillStyle='rgba(0,0,0,0.5)'; ctx.beginPath(); ctx.arc(ex+2,ey+2,enemy.radius,0,Math.PI*2); ctx.fill();
                    const grad = ctx.createRadialGradient(ex,ey,enemy.radius*0.2,ex,ey,enemy.radius);
                    grad.addColorStop(0,color); grad.addColorStop(1,'#1a0000');
                    ctx.fillStyle=grad; ctx.beginPath(); ctx.arc(ex,ey,enemy.radius,0,Math.PI*2); ctx.fill();
                    ctx.strokeStyle='rgba(255,100,100,0.4)'; ctx.lineWidth=1.5; ctx.stroke();
                    const angleToPlayer = Math.atan2(player.y-enemy.y, player.x-enemy.x);
                    for(let s=-1;s<=1;s+=2){
                        const eyeX = ex + Math.cos(angleToPlayer)*enemy.radius*0.4 + Math.cos(angleToPlayer+Math.PI/2)*s*enemy.radius*0.3;
                        const eyeY = ey + Math.sin(angleToPlayer)*enemy.radius*0.4 + Math.sin(angleToPlayer+Math.PI/2)*s*enemy.radius*0.3;
                        ctx.fillStyle='#ff3333'; ctx.shadowColor='#ff0000'; ctx.shadowBlur=6;
                        ctx.beginPath(); ctx.arc(eyeX,eyeY,enemy.radius*0.25,0,Math.PI*2); ctx.fill();
                        ctx.shadowBlur=0;
                    }
                    ctx.restore();
                }
            }

            function drawTrails(){
                if(trailPoints.length<2) return;
                ctx.save();
                for(let i=1;i<trailPoints.length;i++){
                    const t0=trailPoints[i-1], t1=trailPoints[i];
                    const alpha=(t1.life/t1.maxLife)*0.9;
                    // Thicker glowing trail
                    ctx.strokeStyle=`rgba(200,220,255,${alpha})`; 
                    ctx.lineWidth = (t1.life/t1.maxLife) * 14 + 2; // much thicker
                    ctx.lineCap='round';
                    ctx.shadowColor = `rgba(180,210,255,${alpha})`;
                    ctx.shadowBlur = 12;
                    ctx.beginPath(); ctx.moveTo(t0.x,t0.y); ctx.lineTo(t1.x,t1.y); ctx.stroke();
                }
                ctx.restore();
            }

            function drawAfterimages(){
                for(const ai of afterimages){
                    const alpha=ai.life/ai.maxLife*0.35;
                    ctx.save(); ctx.globalAlpha=alpha;
                    ctx.fillStyle='#aaccff'; ctx.beginPath(); ctx.arc(ai.x+shakeX,ai.y+shakeY,player.radius*0.9,0,Math.PI*2); ctx.fill();
                    ctx.restore();
                }
            }

            function drawParticles(){
                for(const p of particles){
                    const alpha=p.life/p.maxLife;
                    if(p.isText){
                        ctx.fillStyle=`rgba(255,215,0,${alpha})`; ctx.font='bold 16px "Courier New"'; ctx.textAlign='center';
                        ctx.fillText(p.text, p.x+shakeX, p.y+shakeY);
                    }else{
                        ctx.globalAlpha=alpha; ctx.fillStyle=p.color; ctx.beginPath();
                        ctx.arc(p.x+shakeX, p.y+shakeY, p.size, 0, Math.PI*2); ctx.fill();
                    }
                }
                ctx.globalAlpha=1;
            }

            function render(){
                ctx.clearRect(0,0,W,H);
                drawFloor();
                drawAfterimages();
                drawTrails();
                drawEnemies();
                drawParticles();
                drawPlayer();
                drawSword();
                // Crosshair
                ctx.strokeStyle='rgba(255,255,255,0.7)'; ctx.lineWidth=1.5;
                ctx.beginPath(); ctx.moveTo(mouseX-12,mouseY); ctx.lineTo(mouseX-7,mouseY); ctx.moveTo(mouseX+7,mouseY); ctx.lineTo(mouseX+12,mouseY);
                ctx.moveTo(mouseX,mouseY-12); ctx.lineTo(mouseX,mouseY-7); ctx.moveTo(mouseX,mouseY+7); ctx.lineTo(mouseX,mouseY+12); ctx.stroke();
                if(gameOver){
                    ctx.fillStyle='rgba(0,0,0,0.7)'; ctx.fillRect(0,0,W,H);
                    ctx.fillStyle='#ff2222'; ctx.font='bold 48px "Courier New"'; ctx.textAlign='center'; ctx.fillText('GAME OVER',W/2,H/2-20);
                    ctx.fillStyle='#fff'; ctx.font='18px "Courier New"'; ctx.fillText(`Score: ${gameScore}  Wave: ${waveNumber}`,W/2,H/2+30);
                    ctx.fillText('Click or press R to restart',W/2,H/2+60);
                }
            }

            function gameLoop(timestamp){
                let dt=(timestamp-lastTime)/1000;
                if(dt<=0) dt=0.016; if(dt>0.2) dt=0.2;
                lastTime=timestamp;
                update(dt); render();
                requestAnimationFrame(gameLoop);
            }

            function init(){
                resetPlayer(); player.x=W/2; player.y=H/2;
                gameScore=0; gameOver=false;
                enemies.length=0; particles.length=0; trailPoints.length=0; afterimages.length=0;
                startWave(1); updateUI();
            }
            init();
            window.addEventListener('keydown', (e)=>{ if(e.key.toLowerCase()==='r' && gameOver) restartGame(); });
            requestAnimationFrame(gameLoop);
        })();
    </script>
</body>
</html>
